title: From first principles
tagline: Notes on software, learning, and building from the ground up
description: >-
  Personal blog of Arun Kant Sharma — essays on programming, web development,
  and learning by going back to first principles.

author:
  name: Arun Kant Sharma
  email: mail@arunkant.com
  twitter: arunkants
  github: arunkant
  linkedin: arunkants

url: "https://arunkant.com"
baseurl: ""
lang: en
timezone: Asia/Kolkata

# UA tracker preserved from previous site (optional, leave empty to disable)
google_analytics: UA-48263499-1

permalink: /posts/:slug/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-redirect-from

# jekyll-archives → tag/category index pages
jekyll-archives:
  enabled: [tags, categories]
  layouts:
    tag: archive
    category: archive
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

defaults:
  - scope: { path: "", type: posts }
    values:
      layout: post
  - scope: { path: "", type: pages }
    values:
      layout: page

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - node_modules
