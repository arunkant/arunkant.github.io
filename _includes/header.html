<header class="site-header">
  <div class="wrap header-row">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/archive/' | relative_url }}">Archive</a>
      <a href="{{ '/tags/' | relative_url }}">Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">RSS</a>
      <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <span class="theme-icon-light" aria-hidden="true">☀</span>
        <span class="theme-icon-dark"  aria-hidden="true">☾</span>
      </button>
    </nav>
  </div>
</header>
